services:
  miles:
    build:
      context: ..
      dockerfile: for_ssh/Dockerfile
      args:
        GH_USER: ${GH_USER}
        GH_TOKEN: ${GH_TOKEN}
    container_name: miles_yuzhou
    ports:
      - "${SSH_PORT:-2222}:2222"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/root/miles
      - ${OPENSAGE_DIR:-../../opensage-adk-dev}:/root/opensage
      - ./data:/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    privileged: true
    ipc: host
    shm_size: 32g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
      nofile:
        soft: 65536
        hard: 65536
    runtime: nvidia
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONPATH=/root/opensage/src:/root/miles
    restart: unless-stopped
